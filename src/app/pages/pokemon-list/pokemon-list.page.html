<ion-header>
  <ion-toolbar color="danger">
    <ion-title>Pokédex</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-searchbar
    placeholder="Buscar Pokémon..."
    (ionInput)="onSearch($event)"
    debounce="300">
  </ion-searchbar>

  <div *ngIf="!searchTerm || searchTerm.length < 2" 
       style="text-align:center; padding: 60px 20px; color: var(--ion-color-medium)">
    <ion-icon name="search-outline" style="font-size: 48px"></ion-icon>
    <p>Escribe al menos 2 letras para buscar</p>
  </div>

  <ion-list *ngIf="filteredPokemons.length > 0">
    <ion-item 
      *ngFor="let pokemon of filteredPokemons" 
      button 
      (click)="goToDetail(pokemon.name)">
      <ion-label>{{ pokemon.name | titlecase }}</ion-label>
      <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
    </ion-item>
  </ion-list>

  <div *ngIf="searchTerm.length >= 2 && filteredPokemons.length === 0 && !loading"
       style="text-align:center; padding: 40px 20px; color: var(--ion-color-medium)">
    <p>No se encontró "{{ searchTerm }}"</p>
  </div>

  <ion-spinner *ngIf="loading" style="display:block; margin: 40px auto;"></ion-spinner>
</ion-content>
